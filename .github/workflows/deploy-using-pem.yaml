name: Deploy ReactApp to EC2 Server

on:
  push:
    branches:
      - main

concurrency:
  group: reactapp-deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy React App
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node-version: [24]

    env:
      TEMP_PATH: /tmp/temp-build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          package-manager-cache: true

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_KEY }}
          EC2_HOST: ${{ secrets.DEV_HOST }}
        run: |
          mkdir -p ~/.ssh

          # DEV_KEY should contain base64 encoded private key
          echo "$SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          # Add EC2 host to known_hosts safely
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Build to EC2
        env:
          EC2_HOST: ${{ secrets.DEV_HOST }}
          EC2_USER: ${{ secrets.DEV_USER }}
        run: |
          # Create temp folder
          ssh -i ~/.ssh/id_rsa ${EC2_USER}@${EC2_HOST} "mkdir -p ${TEMP_PATH}"
          
          # Upload build to temp directory first
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./dist/ \
           ${EC2_USER}@${EC2_HOST}:${TEMP_PATH}/
           
          # Atomic deployment on server
          ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_HOST << 'EOF'
            set -e
            APP_PATH="/var/www/html/web/demo-react"
            BACKUP_PATH="/var/www/html/web/demo-react-backup"
            TEMP_PATH="/tmp/temp-build"
      
            sudo mkdir -p $APP_PATH
            
            # Backup previous deployment
            if [ -d "$APP_PATH" ]; then
              sudo rm -rf $BACKUP_PATH
              sudo cp -a $APP_PATH $BACKUP_PATH
            fi

            # Clean current deployment
            sudo rm -rf ${APP_PATH:?}/*
  
            # Deploy new build
            sudo rsync -av --delete $TEMP_PATH/ $APP_PATH/

            # Correct ownership + permissions
            sudo chown -R www-data:www-data $APP_PATH
            sudo chmod -R 755 $APP_PATH

            # Cleanup
            rm -rf $TEMP_PATH
          EOF
