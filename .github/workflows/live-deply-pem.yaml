name: Deploy ReactApp to EC2 Server

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.11.0]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🟢 Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node modules
        id: cache-nodemodules
        uses: actions/cache@v3
        env:
          cache-name: cache-node-modules
        with:
          # caching node_modules
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        working-directory: ./
        run: |
          npm ci --legacy-peer-deps

      - name: Build
        working-directory: ./
        run: |
          npm run build
      
      - name: Set up SSH
        run: |
          echo "${{ secrets.DEV_KEY }}" | base64 --decode > server_key.pem
          chmod 400 server_key.pem

      - name: Copy build on server
        env:
          EC2_HOST: ${{ secrets.DEV_HOST }}
          EC2_USER: ${{ secrets.DEV_USER }}
        run: |
          # Upload build to a temporary directory on the server
          rsync -avz --delete -e "ssh -i server_key.pem -o StrictHostKeyChecking=no" \
            ./dist/ $EC2_USER@$EC2_HOST:/tmp/temp-build/

          # Move files into the final deployment directory
          ssh -i server_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
            sudo mkdir -p /var/www/html/web/demo-react/
            sudo rm -rf /var/www/html/web/demo-react/*
            sudo rsync -av --delete /tmp/temp-build/ /var/www/html/web/demo-react/
            sudo chown -R www-data:www-data /var/www/html/web/demo-react/
            sudo chmod -R 755 /var/www/html/web/demo-react/
            rm -rf /tmp/temp-build/
          EOF
