name: Deploy ReactApp to EC2 Server

on:
  push:
    branches:
      - develop

concurrency:
  group: reactapp-deploy-develop
  cancel-in-progress: true

permissions:
  contents: read
  
jobs:
  build-and-deploy:
    name: Build and Deploy React App
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node-version: [24]

    env:
      APP_PATH: /var/www/html/web/demo-react
      BACKUP_PATH: /var/www/html/web/demo-react-backup
      TEMP_PATH: /tmp/temp-build
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          package-manager-cache: true

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Project
        run: npm run build
      
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Copy build on server
        env:
          EC2_HOST: ${{ secrets.DEV_HOST }}
          EC2_USER: ${{ secrets.DEV_USER }}
          EC2_PASS: ${{ secrets.DEV_PASS }} 
        run: |
          set -e
          
          echo "Uploading build to temporary directory..."

          sshpass -p "$EC2_PASS" rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${EC2_USER}@${EC2_HOST}:${TEMP_PATH}/

          echo "Creating backup and deploying new build..."

          sshpass -p "$EC2_PASS" ssh \
            -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} << EOF
              set -e

              # Create app directory if it doesn't exist
              sudo mkdir -p ${APP_PATH}

              # Remove old backup if exists
              sudo rm -rf ${BACKUP_PATH}

              # Backup current live build (only if app exists and has files)
              if [ -d "${APP_PATH}" ] && [ "$(ls -A ${APP_PATH} 2>/dev/null)" ]; then
                echo "Creating backup of current deployment..."
                sudo cp -a ${APP_PATH} ${BACKUP_PATH}
              else
                echo "No existing deployment found. Skipping backup."
              fi

              # Clean current deployment
              sudo rm -rf ${APP_PATH:?}/*

              # Deploy new build
              sudo rsync -a --delete ${TEMP_PATH}/ ${APP_PATH}/

              # Set permissions
              sudo chown -R www-data:www-data ${APP_PATH}
              sudo find ${APP_PATH} -type d -exec chmod 755 {} \;
              sudo find ${APP_PATH} -type f -exec chmod 644 {} \;

              # Cleanup temp folder
              rm -rf ${TEMP_PATH}

              echo "Deployment completed successfully."
            EOF
